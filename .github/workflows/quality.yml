name: Quality

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  quality:
    name: Lint, test, and build
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci
        env:
          NODE_ENV: development

      - name: Validate Prisma schema
        run: npm run db:validate
        env:
          DATABASE_URL: mysql://ci:ci@localhost:3306/ci
          SHADOW_DATABASE_URL: mysql://ci:ci@localhost:3306/ci_shadow

      - name: Lint
        run: npm run lint

      - name: Debug - check jest installation
        run: |
          echo "=== Which jest ==="
          which jest || echo "jest not in PATH"
          echo "=== API node_modules/.bin ==="
          ls apps/api/node_modules/.bin/ | grep jest || echo "no jest in api/.bin"
          echo "=== Root node_modules/.bin ==="
          ls node_modules/.bin/ | grep jest || echo "no jest in root/.bin"
          echo "=== Check ts-jest ==="
          ls apps/api/node_modules/ | grep ts-jest || echo "no ts-jest"

      - name: Test API (with coverage)
        run: |
          set -o pipefail
          npm run test:coverage:api 2>&1 | tee /tmp/test-api.log
        env:
          DATABASE_URL: mysql://ci:ci@localhost:3306/ci
          SHADOW_DATABASE_URL: mysql://ci:ci@localhost:3306/ci_shadow
          SESSION_SECRET: ci-session-secret-minimum-32-characters-long
          INTERNAL_WORKER_SECRET: ci-internal-worker-secret-minimum-32-chars
          CREDENTIAL_ENCRYPTION_KEY: ci-credential-encryption-key-for-test-only
          NODE_ENV: test

      - name: Show API test output on failure
        if: failure()
        run: |
          echo "## API Test Output (last 100 lines)" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          tail -100 /tmp/test-api.log >> $GITHUB_STEP_SUMMARY || echo "no log" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY

      - name: Test Web (with coverage)
        run: npm run test:coverage:web
        env:
          NODE_ENV: test

      - name: Build
        run: npm run build
        env:
          DATABASE_URL: mysql://ci:ci@localhost:3306/ci

      - name: Security audit
        run: npm run security:audit

  deploy:
    name: Deploy to VPS
    runs-on: ubuntu-latest
    needs: quality
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    timeout-minutes: 30

    steps:
      - name: SSH and run deploy script
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.VPS_HOST }}
          username: dimasprasetio
          key: ${{ secrets.VPS_SSH_KEY }}
          script: cd /var/www/indobraga && bash deploy.sh
          command_timeout: 25m
