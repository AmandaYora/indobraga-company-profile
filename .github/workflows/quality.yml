name: Quality

on:
  workflow_dispatch:
    inputs:
      skip_migration_backup:
        description: "Skip automatic MySQL backup when Prisma migration/schema files changed. Requires external_db_backup_reference."
        required: false
        type: boolean
        default: false
      external_db_backup_reference:
        description: "Path, snapshot id, or ticket proving an external DB backup already exists."
        required: false
        type: string
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

jobs:
  quality:
    name: Lint, test, and build
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22.12.0
          cache: npm

      - name: Install dependencies
        run: npm ci
        env:
          NODE_ENV: development

      - name: Generate Prisma Client
        run: npm run db:generate

      - name: Validate Prisma schema
        run: npm run db:validate
        env:
          DATABASE_URL: mysql://ci:ci@localhost:3306/ci
          SHADOW_DATABASE_URL: mysql://ci:ci@localhost:3306/ci_shadow

      - name: Lint
        run: npm run lint

      - name: Test API (with coverage)
        run: |
          set -o pipefail
          npm run test:coverage:api 2>&1 | tee /tmp/test-api.log
        env:
          DATABASE_URL: mysql://ci:ci@localhost:3306/ci
          SHADOW_DATABASE_URL: mysql://ci:ci@localhost:3306/ci_shadow
          SESSION_SECRET: ci-session-secret-minimum-32-characters-long
          INTERNAL_WORKER_SECRET: ci-internal-worker-secret-minimum-32-chars
          CREDENTIAL_ENCRYPTION_KEY: ci-credential-encryption-key-for-test-only
          NODE_ENV: test

      - name: Show API test output on failure
        if: failure()
        run: |
          echo "## API Test Output (last 100 lines)" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          tail -100 /tmp/test-api.log >> $GITHUB_STEP_SUMMARY || echo "no log" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY

      - name: Test Web (with coverage)
        run: npm run test:coverage:web
        env:
          NODE_ENV: test

      - name: Build
        id: build
        run: |
          set -o pipefail
          npm run build 2>&1 | tee /tmp/build.log
        env:
          DATABASE_URL: mysql://ci:ci@localhost:3306/ci
          SHADOW_DATABASE_URL: mysql://ci:ci@localhost:3306/ci_shadow
          SESSION_SECRET: ci-session-secret-minimum-32-characters-long
          INTERNAL_WORKER_SECRET: ci-internal-worker-secret-minimum-32-chars
          CREDENTIAL_ENCRYPTION_KEY: ci-credential-encryption-key-for-test-only

      - name: Show build output on failure
        if: failure() && steps.build.outcome == 'failure'
        run: |
          echo "## Build Output (last 120 lines)" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          tail -120 /tmp/build.log >> $GITHUB_STEP_SUMMARY || echo "no log" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY

          message="$(tail -40 /tmp/build.log | sed ':a;N;$!ba;s/%/%25/g;s/\r/%0D/g;s/\n/%0A/g')"
          echo "::error title=Build failed::$message"

      - name: Security audit
        run: npm run security:audit

  deploy:
    name: Deploy to VPS
    runs-on: ubuntu-latest
    needs: quality
    if: github.ref == 'refs/heads/main' && (github.event_name == 'push' || github.event_name == 'workflow_dispatch')
    environment: production
    timeout-minutes: 30
    concurrency:
      group: production
      cancel-in-progress: false

    steps:
      - name: SSH and run deploy script
        uses: appleboy/ssh-action@v1
        env:
          DEPLOY_SHA: ${{ github.sha }}
          DEPLOY_BRANCH: main
          PUBLIC_SMOKE_BASE_URL: https://indobraga.com
          SKIP_MIGRATION_BACKUP: ${{ github.event.inputs.skip_migration_backup || 'false' }}
          EXTERNAL_DB_BACKUP_REFERENCE: ${{ github.event.inputs.external_db_backup_reference || '' }}
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER || 'dimasprasetio' }}
          key: ${{ secrets.VPS_SSH_KEY }}
          envs: DEPLOY_SHA,DEPLOY_BRANCH,PUBLIC_SMOKE_BASE_URL,SKIP_MIGRATION_BACKUP,EXTERNAL_DB_BACKUP_REFERENCE
          script: |
            set -euo pipefail
            cd /var/www/indobraga/current
            if ! git diff --quiet || ! git diff --cached --quiet; then
              git status --short
              echo "Production worktree has tracked local changes; aborting deploy."
              exit 1
            fi
            git fetch --prune origin "$DEPLOY_BRANCH"
            git cat-file -e "${DEPLOY_SHA}^{commit}"
            git checkout -B "$DEPLOY_BRANCH" "$DEPLOY_SHA"
            bash scripts/deploy-production.sh "$DEPLOY_SHA"
          command_timeout: 25m
