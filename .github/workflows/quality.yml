name: Quality

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  quality:
    name: Lint, test, and build
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Validate Prisma schema
        run: npm run db:validate
        env:
          DATABASE_URL: mysql://ci:ci@localhost:3306/ci
          SHADOW_DATABASE_URL: mysql://ci:ci@localhost:3306/ci_shadow

      - name: Run quality gate
        run: npm run quality:coverage

  deploy:
    name: Deploy to VPS
    runs-on: ubuntu-latest
    needs: quality
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    timeout-minutes: 30

    steps:
      - name: SSH and run deploy script
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.VPS_HOST }}
          username: dimasprasetio
          key: ${{ secrets.VPS_SSH_KEY }}
          script: cd /var/www/indobraga && bash deploy.sh
          command_timeout: 25m
